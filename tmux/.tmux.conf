set -g prefix2 C-a
bind C-a send-prefix -2

set -g default-terminal "tmux-256color"
set -g mouse on

# force Vi mode
set -g status-keys vi
set -g mode-keys vi

# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename off   # rename window to reflect current program
set -g allow-rename off       # don't rename windows based on current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

# -- navigation ----------------------------------------------------------------

# create session
bind C-c new-session

# split current window horizontally
bind - split-window -v -c "#{pane_current_path}"
# split current window vertically
bind | split-window -h -c "#{pane_current_path}"

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind Tab last-window                                    # move to last active window

bind m set -g mouse

# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode # enter copy mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# copy to X11 clipboard
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'
# copy to Wayland clipboard
if -b '[ "$XDG_SESSION_TYPE" = "wayland" ] && command -v wl-copy > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | wl-copy"'
# copy to macOS clipboard
if -b 'command -v pbcopy > /dev/null 3>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | pbcopy"'

# -- Catppuccin Mocha theme  ---------------------------------------------------

# From https://github.com/catppuccin/tmux/blob/main/themes/catppuccin_mocha_tmux.conf

set -g @thm_bg "#1e1e2e"
set -g @thm_fg "#cdd6f4"

# Colors
set -g @thm_rosewater "#f5e0dc"
set -g @thm_flamingo "#f2cdcd"
set -g @thm_pink "#f5c2e7"
set -g @thm_mauve "#cba6f7"
set -g @thm_red "#f38ba8"
set -g @thm_maroon "#eba0ac"
set -g @thm_peach "#fab387"
set -g @thm_yellow "#f9e2af"
set -g @thm_green "#a6e3a1"
set -g @thm_teal "#94e2d5"
set -g @thm_sky "#89dceb"
set -g @thm_sapphire "#74c7ec"
set -g @thm_blue "#89b4fa"
set -g @thm_lavender "#b4befe"

# Surfaces and overlays
set -g @thm_subtext_1 "#a6adc8"
set -g @thm_subtext_0 "#bac2de"
set -g @thm_overlay_2 "#9399b2"
set -g @thm_overlay_1 "#7f849c"
set -g @thm_overlay_0 "#6c7086"
set -g @thm_surface_2 "#585b70"
set -g @thm_surface_1 "#45475a"
set -g @thm_surface_0 "#313244"
set -g @thm_mantle "#181825"
set -g @thm_crust "#11111b"

# -- status bar  ---------------------------------------------------------------

set -g status-left-length 200
set -g status-right-length 200
set -g status-position bottom

set -gF @status_bg "#{@thm_bg}"

set -gF @session_bg "#{@thm_blue}"
set -gF @session_fg "#{@thm_crust}"

set -gF @window_curr_bg "#{@thm_green}"
set -gF @window_curr_fg "#{@thm_crust}"

set -gF @window_last_bg "#{@thm_overlay_2}"
set -gF @window_last_fg "#{@thm_crust}"

set -gF @window_bg "#{@thm_surface_0}"
set -gF @window_fg "#{@thm_fg}"

set -gF @hostname_bg "#{@thm_red}"
set -gF @hostname_fg "#{@thm_crust}"

set -gF @uname_bg "#{@thm_rosewater}"
set -gF @uname_fg "#{@thm_crust}"

set -g status-style "bg=#{@status_bg},fg=#{thm_fg}"

# Left status
set -g status-left "#[bg=#{@session_bg},fg=#{@session_fg},bold] ❒ #S \
#[bg=#{@status_bg},fg=#{@session_bg}]#[bg=#{@status_bg},fg=#{@status_bg}] "

# Windows (inactive)
set -gF @window_last_pre "#[bg=#{@status_bg},fg=#{@window_last_bg}]\
#[bg=#{@window_last_bg},fg=#{@window_last_fg}] "

set -gF @window_last_post "#[bg=#{@status_bg},fg=#{@window_last_bg}]"

set -gF @window_default_pre "#[bg=#{@status_bg},fg=#{@window_bg}]\
#[bg=#{@window_bg},fg=#{@window_fg}]"

set -gF @window_default_post "#[bg=#{@status_bg},fg=#{@window_bg}]"

set -g window-status-format "#{?window_last_flag,#{@window_last_pre} #I #W \
#{@window_last_post},#{@window_default_pre} #I #W #{@window_default_post}}"

# Windows (active)
set -g window-status-current-format "#[bg=#{@status_bg},fg=#{@window_curr_bg}]\
#[bg=#{@window_curr_bg},fg=#{@window_curr_fg},bold] #I #W \
#[bg=#{@status_bg},fg=#{@window_curr_bg}]"

set -g window-status-separator ""

# Right status
set -g status-right "#[bg=#{@status_bg},fg=#{@thm_fg}]\
#{?mouse,󰍽 , } \
#[bg=#{@status_bg},fg=#{@thm_fg}] %a, %d %b %Y \
#[bg=#{@status_bg},fg=#{@thm_fg}] %H:%M \
#[bg=#{@status_bg},fg=#{@uname_bg}]#[bg=#{@uname_bg},fg=#{@uname_fg}] #(whoami) \
#[bg=#{@uname_bg},fg=#{@hostname_bg}]#[bg=#{@hostname_bg},fg=#{@hostname_fg}] #H "
