# For pop up notification windows that don't use notifications api
for_window [class="zoom" title="^zoom$"] border none, floating enable

# The annotation toolbar is super annoying - put it in scratchpad by default
for_window [class="zoom" title="^annotate_toolbar$"] border none, floating enable, move scratchpad

# For specific Zoom windows
for_window [class="zoom" title="^(Zoom|About)$"] border pixel, floating enable
for_window [class="zoom" title="Settings"] floating enable, floating_minimum_size 960 x 700
for_window [class="zoom" title="^Zoom Workplace"] border none, floating enable

# Don't idle if in zoom meeting
for_window [class="zoom" title="Meeting$"] inhibit_idle open
